# html lang
language: en

title: Soymilk
author: Soymilk

# index page navigation
menu:
  Home:
    path: /
    icon: fas fa-home
  Archives:
    path: /archives
    icon: fas fa-archive
  About:
    path: /about
    icon: fas fa-user-circle

social:
  github:
    icon: fab fa-github-alt 
    url: https://github.com/MRsoymilk
  gmail:
    icon: fas fa-envelope
    url: mailto:codermrsoymilk@gmail.com

# code highlight
highlight: railscasts
color_scheme: default

# date style
date:
  format: dddd, MMMM Do YYYY, h:mm:ss a

# show system information
system: true

# show article number
show_count: false

# show in index page
cmd_category: "tree"
cmd_tag: "dir"

# LiveRe
livere:
  status: true
  livere_data_uid: "MTAyMC80NjA4MS8yMjU5Mg=="

# ChangYan
changyan:
  status: true
  appid: "cyuGH4lBk"
  conf: "prod_87d0328c17d3752e3610edeceb7c1fbc"

# scroll to top
scroll2top:
  mouse_out_ani: ['/2top/out_1.png']
  mouse_hover_ani: ['/2top/hover_1.png', '/2top/hover_2.png']
  mouse_click_ani: ['/2top/click_1.png', '/2top/click_2.png', '/2top/click_3.png']

# layout
layout: 'tile'

# ffolders
ffolders:
  size: 'medium'
  color: 'pink'

# background blur
background:
  blur: "10"  # range 0 - 20

# font
font:
  fun.ttf
